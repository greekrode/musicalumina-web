name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch so an in-flight CI against an
# older commit doesn't block the newer push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

      - name: Build
        # Supplies placeholder env so `import.meta.env.*` reads don't crash
        # the production build. These are never used at CI time — they
        # just need to be non-empty strings for the Vite build to succeed.
        env:
          VITE_SUPABASE_URL: "https://ci.supabase.invalid"
          VITE_SUPABASE_ANON_KEY: "ci-placeholder"
          VITE_CLERK_PUBLISHABLE_KEY: "pk_test_ci-placeholder"
          VITE_TINYMCE_API_KEY: "ci-placeholder"
          VITE_N8N_USERNAME: "ci-placeholder"
          VITE_N8N_PASSWORD: "ci-placeholder"
          VITE_JWT_SECRET: "ci-placeholder"
        run: npm run build
